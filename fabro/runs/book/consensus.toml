version = 1
graph = "../../workflows/module-chapter/workflow.fabro"
goal = "Create a graduate-level, navigable interactive-book chapter for commonware-consensus with embedded visualization specifications."

[llm]
provider = "anthropic"
model = "MiniMax-M2.7-highspeed"

[sandbox]
provider = "local"

[sandbox.env]
ANTHROPIC_BASE_URL = "https://api.minimax.io/anthropic"
ANTHROPIC_AUTH_TOKEN = "${env.MINIMAX_API_KEY}"
API_TIMEOUT_MS = "3000000"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
ANTHROPIC_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_SMALL_FAST_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_SONNET_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_OPUS_MODEL = "MiniMax-M2.7-highspeed"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "MiniMax-M2.7-highspeed"

[vars]
module_slug = "consensus"
module_display_name = "commonware-consensus"
crate_path = "consensus"
readme_path = "consensus/README.md"
source_glob = "consensus/src/**"
chapter_dir = "docs/commonware-book/consensus"
supplemental_context = ""
module_focus = "- Focus especially on protocol flow, safety vs liveness tradeoffs, actor boundaries, quorum or threshold assumptions, and how simplex / ordered_broadcast / aggregation compose into a consensus story."
